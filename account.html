<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Account Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="user-header" style="height: auto; flex-direction: row; align-items: center; justify-content: flex-start; border-bottom: none; padding-bottom: 0;">
        <button onclick="location.href='index.html'" style="background:none; border:none; color:#4a148c; font-size: 1.5em; cursor:pointer;">← Back</button>
    </header>

    <div class="login-wrapper">
        <div class="auth-container">
            <h2 id="auth-title">Login</h2>
            
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Password">
            
            <button class="save-btn" onclick="authAction()">Submit</button>
        </div>
    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.x.x/firebase-auth.js";
        
        window.authAction = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            
            if (!email || !pass) {
                alert("Please enter both email and password.");
                return;
            }

            try { 
                await signInWithEmailAndPassword(auth, email, pass); 
                location.href = "index.html"; 
            } catch(e) { 
                alert("Login failed: " + e.message); 
            }
        };
    </script>
</body>
</html>
