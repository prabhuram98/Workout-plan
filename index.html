<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Workout Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app-container">
    <!-- HOME SCREEN -->
    <div id="screen-home" class="screen active">
        <header>
            <h1>Hello, Prabhu! 👋</h1>
            <p>Ready to crush your goals?</p>
        </header>

        <div class="action-grid">
            <div class="card" onclick="navTo('screen-workout')"><i class="fa-solid fa-dumbbell"></i><h2>Workout</h2></div>
            <div class="card"><i class="fa-solid fa-clock-rotate-left"></i><h2>History</h2></div>
            <div class="card"><i class="fa-solid fa-chart-line"></i><h2>Progress</h2></div>
            <div class="card"><i class="fa-solid fa-book"></i><h2>Library</h2></div>
            <div class="card"><i class="fa-solid fa-weight-scale"></i><h2>Metrics</h2></div>
            <div class="card"><i class="fa-solid fa-bowl-food"></i><h2>Diet</h2></div>
            <div class="card"><i class="fa-solid fa-medal"></i><h2>Challenges</h2></div>
            <div class="card" onclick="navTo('screen-settings')"><i class="fa-solid fa-gear"></i><h2>Settings</h2></div>
        </div>
    </div>

    <!-- WORKOUT SCREEN (Placeholder) -->
    <div id="screen-workout" class="screen">
        <button class="back-btn" onclick="navTo('screen-home')"><i class="fa-solid fa-arrow-left"></i></button>
        <h2>Workouts</h2>
        <p>Select a routine to begin.</p>
    </div>

    <!-- SETTINGS SCREEN (Placeholder) -->
    <div id="screen-settings" class="screen">
        <button class="back-btn" onclick="navTo('screen-home')"><i class="fa-solid fa-arrow-left"></i></button>
        <h2>Settings</h2>
        <div class="card" style="margin-top: 20px;">
            <p>Cloud Sync: <b>Enabled</b></p>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
