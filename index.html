<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PR Workout</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">

  <h1 class="title">PR Workout</h1>

  <div class="bigCard" onclick="show('workout')">
    🏋️ Workout
  </div>

  <div class="bigCard" onclick="show('progress')">
    📊 Progress
  </div>

  <div class="bigCard" onclick="show('diet')">
    🥗 Diet
  </div>

  <div class="footer">Developed By PR</div>

</div>

<!-- WORKOUT -->
<div id="workout" class="screen">

  <div class="topbar">
    <button onclick="show('home')">←</button>
    <h2>Workout</h2>
  </div>

  <div class="card">
    Leg Press — 4×8–12
  </div>

  <div class="card">
    Chest Press — 4×8–12
  </div>

  <div class="card">
    Lat Pulldown — 4×8–12
  </div>

</div>

<!-- PROGRESS -->
<div id="progress" class="screen">

  <div class="topbar">
    <button onclick="show('home')">←</button>
    <h2>Progress</h2>
  </div>

  <div class="card">Workouts Completed: 0</div>
  <div class="card">Streak: 0 days</div>

</div>

<!-- DIET -->
<div id="diet" class="screen">

  <div class="topbar">
    <button onclick="show('home')">←</button>
    <h2>Diet</h2>
  </div>

  <div class="card">High Protein Plan Coming Soon</div>

</div>

<script src="app.js"></script>

</body>
</html>
