<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRABHU Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!-- HOME -->
<section id="home" class="screen active">
  <h1>PRABHU Trainer</h1>

  <div class="menu">
    <div class="card" data-go="workouts">🏋️ Workouts</div>
    <div class="card" data-go="diet">🍽️ Diet</div>
    <div class="card" data-go="progress">📊 Progress</div>
  </div>

  <p class="footer">Developed By PR</p>
</section>

<!-- WORKOUTS -->
<section id="workouts" class="screen">
  <h2>Workouts</h2>
  <div id="workoutList"></div>
</section>

<!-- DETAIL -->
<section id="detail" class="screen">
  <h2 id="workoutTitle"></h2>
  <div id="exerciseList"></div>
  <button onclick="go('workouts')">Back</button>
</section>

<!-- DIET -->
<section id="diet" class="screen">
  <h2>Diet</h2>
  <div class="card">Calories: 1900–2100</div>
  <div class="card">Protein: 100–130g</div>
  <button onclick="go('home')">Back</button>
</section>

<!-- PROGRESS -->
<section id="progress" class="screen">
  <h2>Progress</h2>
  <div class="card" id="stats"></div>
  <button onclick="go('home')">Back</button>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
