<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRABHU Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!-- HOME -->
<section id="home" class="screen active">
  <h1 class="title">PRABHU Trainer</h1>

  <div class="grid">

    <div class="card" onclick="showScreen('workout')">
      Workout
    </div>

    <div class="card" onclick="showScreen('progress')">
      Progress
    </div>

    <div class="card" onclick="showScreen('diet')">
      Diet
    </div>

  </div>

  <div class="footer">Developed By PR</div>
</section>

<!-- WORKOUT -->
<section id="workout" class="screen">

  <div class="topbar">
    <button onclick="showScreen('home')">←</button>
    <h2>Workout</h2>
  </div>

  <div class="progressBar">
    <div class="fill"></div>
  </div>

  <div class="exerciseCard">
    Leg Press
    <span>4 × 8–12</span>
  </div>

  <div class="exerciseCard">
    Chest Press
    <span>4 × 8–12</span>
  </div>

  <button class="primary">Complete Workout</button>

</section>

<!-- PROGRESS -->
<section id="progress" class="screen">

  <div class="topbar">
    <button onclick="showScreen('home')">←</button>
    <h2>Progress</h2>
  </div>

  <div class="statCard">Total Workouts: 0</div>
  <div class="statCard">
