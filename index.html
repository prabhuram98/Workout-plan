<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>PRABHU Trainer</h1>

<div id="menu">
  <button onclick="go('workouts')">Workouts</button>
  <button onclick="go('diet')">Diet</button>
  <button onclick="go('progress')">Progress</button>
</div>

<div id="workouts" class="page"></div>

<div id="detail" class="page hidden">
  <h2 id="title"></h2>
  <div id="ex"></div>
  <button onclick="go('workouts')">Back</button>
</div>

<div id="diet" class="page hidden">
  <h2>Diet</h2>
</div>

<div id="progress" class="page hidden">
  <h2>Progress</h2>
  <div id="stats"></div>
</div>

<!-- IMPORTANT: defer fixes click issues -->
<script src="app.js" defer></script>

</body>
</html>
