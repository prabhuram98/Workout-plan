<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRABHU's Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="glass-header">
    <h1>PRABHU's Trainer</h1>
    <p>Train Smart • Stay Consistent</p>
  </div>

  <div class="grid">
    <div class="glass-card" onclick="go('workouts')">🏋️ Workout</div>
    <div class="glass-card" onclick="go('diet')">🍽️ Diet</div>
    <div class="glass-card" onclick="go('progress')">📊 Progress</div>
  </div>

  <div class="footer">Developed By PR</div>
</div>

<!-- WORKOUT LIST -->
<div id="workouts" class="screen">
  <div class="header">Workout Plan</div>
  <div id="workoutList"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="screen">
  <div class="header" id="wtitle"></div>
  <div id="exList"></div>

  <div class="timer">
    <canvas id="circle" width="120" height="120"></canvas>
    <button onclick="startTimer(60)">Start Rest</button>
  </div>
</div>

<!-- DIET -->
<div id="diet" class="screen">
  <div class="header">Diet</div>
  <div class="glass-card">Calories: 1900–2100</div>
  <div class="glass-card">Protein: 100–130g</div>
</div>

<!-- PROGRESS -->
<div id="progress" class="screen">
  <div class="header">Progress</div>

  <div class="stats">
    <div class="glass-card">🔥 Logs: <span id="count"></span></div>
    <div class="glass-card">📅 Streak: <span id="streak"></span></div>
  </div>

  <div id="barChart"></div>

  <div class="glass-card">
    <h3>Recent Activity</h3>
    <div id="history"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
