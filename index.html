<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness App</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
    <h1 class="title">Fitness App</h1>

    <div class="grid">
        <div class="card big" onclick="openWorkoutHub()">🏋️ Workout</div>
        <div class="card big" onclick="openProgress()">📊 Progress</div>
    </div>
</div>

<!-- WORKOUT HUB -->
<div id="workoutHub" class="screen">
    <div class="top">
        <h2>Workout Hub</h2>
        <button onclick="goHome()">Back</button>
    </div>

    <div id="workoutList"></div>
</div>

<!-- WORKOUT DETAIL -->
<div id="workoutDetail" class="screen">
    <div class="top">
        <h2 id="workoutTitle"></h2>
        <button onclick="saveWorkout()">Save</button>
    </div>

    <div id="exerciseList"></div>
</div>

<!-- PROGRESS -->
<div id="progress" class="screen">
    <div class="top">
        <h2>Progress</h2>
        <button onclick="goHome()">Back</button>
    </div>

    <div id="progressData"></div>
</div>

<script src="app.js"></script>
</body>
</html>
