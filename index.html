<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PRABHU's Trainer</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home">
    <h1>PRABHU's Trainer</h1>

    <div class="grid">
      <div class="card" onclick="switchTab('workouts')">🏋️ Workout</div>
      <div class="card" onclick="switchTab('diet')">🍽️ Diet</div>
      <div class="card" onclick="switchTab('progress')">📊 Progress</div>
    </div>

    <div class="footer">Developed By PR</div>
  </div>
</div>

<!-- WORKOUT LIST -->
<div id="workouts" class="screen">
  <h2>Workouts</h2>
  <div id="workoutList"></div>
</div>

<!-- WORKOUT DETAIL -->
<div id="detail" class="screen">
  <h2 id="wtitle"></h2>
  <div id="exList"></div>

  <div class="timer">
    <canvas id="timerCanvas" width="120" height="120"></canvas>
    <button onclick="startRest(60)">Start Rest</button>
  </div>
</div>

<!-- DIET -->
<div id="diet" class="screen">
  <h2>Diet</h2>
  <div class="card">Calories: 1900–2100</div>
  <div class="card">Protein: 100–130g</div>
</div>

<!-- PROGRESS -->
<div id="progress" class="screen">

<h2>Progress</h2>

<div class="stats">
  <div class="card">🔥 Streak: <span id="streak"></span></div>
  <div class="card">✔ Done: <span id="done"></span></div>
</div>

<div class="card">
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Fat Loss Prediction</h3>
<div id="fat"></div>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <button onclick="switchTab('home')">Home</button>
  <button onclick="switchTab('workouts')">Workout</button>
  <button onclick="switchTab('diet')">Diet</button>
  <button onclick="switchTab('progress')">Progress</button>
</div>

<script src="app.js"></script>
</body>
</html>
