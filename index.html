<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Workout App">
    
    <title>Workout Tracker</title>

    <div id="screen-home" class="screen active">
        <div class="header-top">
            <div>
                <h1>Hello, Prabhu! 👋</h1>
                <p>Ready to crush your goals today?</p>
            </div>
            <div class="avatar"><i class="fa-solid fa-user"></i></div>
        </div>

        <div class="main-card" onclick="navTo('screen-workout-list')">
            <div class="icon-box"><i class="fa-solid fa-dumbbell"></i></div>
            <div>
                <h2>Workout</h2>
                <p>Start your training<br>and stay strong</p>
            </div>
            <div class="chevron"><i class="fa-solid fa-chevron-right"></i></div>
        </div>

        <div class="main-card">
            <div class="icon-box" style="background: linear-gradient(135deg, #a644ff, #6b1fb3);"><i class="fa-solid fa-chart-line"></i></div>
            <div>
                <h2>Progress</h2>
                <p>Track your performance<br>and stay motivated</p>
            </div>
            <div class="chevron"><i class="fa-solid fa-chevron-right"></i></div>
        </div>

        <div class="main-card">
            <div class="icon-box" style="background: linear-gradient(135deg, #7c2de0, #400d8a);"><i class="fa-solid fa-bowl-food"></i></div>
            <div>
                <h2>Diet</h2>
                <p>Eat healthy and<br>fuel your body</p>
            </div>
            <div class="chevron"><i class="fa-solid fa-chevron-right"></i></div>
        </div>

        <div class="stats-container">
            <div class="stat-item">
                <i class="fa-solid fa-fire" style="color: white;"></i>
                <h3>0</h3>
                <p>Day Streak</p>
            </div>
            <div class="stat-item" style="border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);">
                <i class="fa-solid fa-trophy" style="color: white;"></i>
                <h3>0</h3>
                <p>Workouts</p>
            </div>
            <div class="stat-item">
                <i class="fa-solid fa-bullseye" style="color: white;"></i>
                <h3>0%</h3>
                <p>Goal Progress</p>
            </div>
        </div>
    </div>
