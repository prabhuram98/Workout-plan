<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRABHU's Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="title">PRABHU's Trainer</div>

  <div class="home-grid">
    <div class="big-icon" onclick="go('workout')">
      🏋️
      <span>Workout</span>
    </div>

    <div class="big-icon" onclick="go('diet')">
      📊
      <span>Diet</span>
    </div>
  </div>
</div>

<!-- WORKOUT -->
<div id="workout" class="screen">

  <div class="header">Workout Plan</div>

  <div class="card" onclick="openWorkout('Workout 1')">Workout 1 – Full Body A</div>
  <div class="card" onclick="openWorkout('Workout 2')">Workout 2 – Fat Loss</div>
  <div class="card" onclick="openWorkout('Workout 3')">Workout 3 – Upper Body</div>
  <div class="card" onclick="openWorkout('Workout 4')">Workout 4 – Recovery</div>
  <div class="card" onclick="openWorkout('Workout 5')">Workout 5 – Full Body B</div>
  <div class="card" onclick="openWorkout('Workout 6')">Workout 6 – HIIT</div>

</div>

<!-- WORKOUT DETAIL -->
<div id="detail" class="screen">
  <div class="header" id="wtitle"></div>
  <div id="exercises"></div>
</div>

<!-- DIET -->
<div id="diet" class="screen">
  <div class="header">Diet Plan</div>

  <div class="card">🥚 High Protein Foods</div>
  <div class="card">🍽️ Meal Structure</div>
  <div class="card">🚫 Foods to Avoid</div>
</div>

<script src="app.js"></script>
</body>
</html>
