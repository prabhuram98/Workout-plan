<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRABHU's Trainer</title>
<link rel="stylesheet" href="style.css"/>
</head>

<body>

<div id="home" class="screen active">
  <h1>PRABHU's Trainer</h1>

  <div class="card big" onclick="openPicker()">
    🏋️ Workout
  </div>

  <div class="card big" onclick="alert('Diet coming next phase')">
    🍽️ Diet
  </div>

  <div class="footer">Developed By PR</div>
</div>

<!-- PICKER SHEET -->
<div id="picker" class="sheet hidden">
  <div class="sheet-content">
    <h3>Choose Today's Workout</h3>

    <div id="workoutList"></div>

    <button onclick="closePicker()">Cancel</button>
  </div>
</div>

<!-- WORKOUT SCREEN -->
<div id="workout" class="screen hidden">

  <div class="topbar">
    <button onclick="back()">←</button>
    <h2 id="wtitle"></h2>
  </div>

  <div id="progressBar"></div>
  <div id="progressText"></div>

  <div id="exList"></div>

  <button id="completeBtn" onclick="completeWorkout()">
    ✓ Complete Workout
  </button>

</div>

<script src="app.js"></script>
</body>
</html>
