<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRABHU's Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="header">🏋️ PRABHU's Trainer</div>

  <div class="grid">
    <div class="icon-card" onclick="go('workout')">🏋️<br><span>Workout</span></div>
    <div class="icon-card" onclick="go('progress')">📊<br><span>Progress</span></div>
  </div>

  <div class="info">🔥 Streak: <span id="streak">0</span></div>
</div>

<!-- WORKOUT -->
<div id="workout" class="screen">
  <div class="top">Workout Hub</div>
  <div id="workoutList"></div>
</div>

<!-- DETAIL -->
<div id="detail" class="screen">
  <div class="top">
    <div id="wtitle"></div>
    <button onclick="saveWorkout()">Save</button>
  </div>
  <div id="exercises"></div>
</div>

<!-- PROGRESS -->
<div id="progress" class="screen">
  <div class="top">Progress</div>
  <div id="progressBox"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div onclick="go('home')">🏠</div>
  <div onclick="go('workout')">🏋️</div>
  <div onclick="go('progress')">📊</div>
</div>

<script src="app.js"></script>
</body>
</html>
