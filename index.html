<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PRABHU's Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="title">PRABHU's Trainer</div>

  <div class="home-grid">
    <div class="big-icon" onclick="go('workout')">
      🏋️
      <span>Workout</span>
    </div>

    <div class="big-icon" onclick="go('diet')">
      📊
      <span>Diet</span>
    </div>
  </div>
</div>

<!-- WORKOUT LIST -->
<div id="workout" class="screen">
  <div class="header">Workout Plan</div>

  <div class="card" onclick="openWorkout('w1')">Workout 1 – Full Body A</div>
  <div class="card" onclick="openWorkout('w2')">Workout 2 – Fat Loss</div>
  <div class="card" onclick="openWorkout('w3')">Workout 3 – Upper Body</div>
  <div class="card" onclick="openWorkout('w4')">Workout 4 – Recovery</div>
  <div class="card" onclick="openWorkout('w5')">Workout 5 – Full Body B</div>
  <div class="card" onclick="openWorkout('w6')">Workout 6 – HIIT</div>
</div>

<!-- DETAIL -->
<div id="detail" class="screen">
  <div class="header" id="wtitle"></div>
  <div id="details"></div>
</div>

<!-- DIET -->
<div id="diet" class="screen">
  <div class="header">Diet Plan</div>

  <div class="card">🥚 Eggs, Greek Yogurt, Paneer, Tofu</div>
  <div class="card">🍽️ 1900–2100 calories</div>
  <div class="card">🚫 Avoid alcohol, sugar drinks, fried food</div>
</div>

<script src="app.js"></script>
</body>
</html>
