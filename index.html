<!DOCTYPE html>
<html>
<body>
    <input id="email" type="email">
    <input id="password" type="password">
    <button onclick="loginUser(document.getElementById('email').value, document.getElementById('password').value)">Login</button>
    <button onclick="resetPassword(document.getElementById('email').value)">Forgot Password</button>
    <script type="module" src="auth.js"></script>
</body>
</html>
