<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRABHU's Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!-- HOME -->
<section id="home" class="screen active">
  <h1>PRABHU's Trainer</h1>

  <div class="grid">
    <div class="card" data-go="workouts">🏋️ Workout</div>
    <div class="card" data-go="diet">🍽️ Diet</div>
    <div class="card" data-go="progress">📊 Progress</div>
  </div>

  <div class="footer">Developed By PR</div>
</section>

<!-- WORKOUTS -->
<section id="workouts" class="screen">
  <h2>Workouts</h2>
  <div id="workoutList"></div>
</section>

<!-- DETAIL -->
<section id="detail" class="screen">
  <h2 id="title"></h2>
  <div id="exercises"></div>

  <div class="timer">
    <canvas id="timerCanvas" width="140" height="140"></canvas>
    <button id="timerBtn">Start Rest</button>
  </div>
</section>

<!-- DIET -->
<section id="diet" class="screen">
  <h2>Diet</h2>
  <div class="card">Calories: 1900–2100</div>
  <div class="card">Protein: 100–130g</div>
</section>

<!-- PROGRESS -->
<section id="progress" class="screen">
  <h2>Progress</h2>

  <div class="card" id="stats"></div>
  <div class="card" id="history"></div>
</section>

</div>

<script src="app.js" defer></script>
</body>
</html>
