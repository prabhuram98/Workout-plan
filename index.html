<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRABHU Trainer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="app">

<!-- TOP BAR -->
<div class="topbar">
  <div id="backBtn" onclick="back()">←</div>
  <div class="title">PRABHU Trainer</div>
</div>

<!-- HOME -->
<section class="screen active" id="home">

  <div class="grid">
    <div class="big" onclick="go('workoutSelect')">🏋️ Workout</div>
    <div class="big" onclick="go('diet')">🍽️ Diet</div>
    <div class="big" onclick="go('progress')">📊 Progress</div>
  </div>

  <div class="footer">Developed By PR</div>
</section>

<!-- WORKOUT SELECT -->
<section class="screen" id="workoutSelect">
  <h2>Select Today’s Workout</h2>

  <select id="todayWorkout"></select>
  <button onclick="openWorkoutFromSelect()">Continue</button>
</section>

<!-- WORKOUT DETAIL -->
<section class="screen" id="workoutDetail">
  <h2 id="wtitle"></h2>
  <div id="exercises"></div>
</section>

<!-- DIET -->
<section class="screen" id="diet">
  <h2>Diet Plan</h2>
  <div class="card">Calories: 1900–2100</div>
</section>

<!-- PROGRESS -->
<section class="screen" id="progress">
  <h2>Progress</h2>
  <div id="stats"></div>
</section>

</div>

<script src="app.js"></script>
</body>
</html>
