<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Dashboard</title>
</head>
<body>
    <header class="user-header">
        <h1 id="welcome-message">Hello 👋</h1>
        <p>Ready to crush your goals?</p>
    </header>

    <div class="grid-container">
        <button class="card" onclick="location.href='workout.html'">Workout</button>
        <button class="card" onclick="location.href='history.html'">History</button>
        <button class="card" onclick="location.href='progress.html'">Progress</button>
        <button class="card" onclick="location.href='library.html'">Library</button>
        <button class="card" onclick="location.href='metrics.html'">Metrics</button>
        <button class="card" onclick="location.href='diet.html'">Diet</button>
        <button class="card" onclick="location.href='challenges.html'">Challenges</button>
        <button class="card" onclick="location.href='settings.html'">Settings</button>
    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.x.x/firebase-auth.js";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                const username = user.displayName || user.email.split('@')[0];
                document.getElementById('welcome-message').innerHTML = `Hello 👋 <br> ${username}`;
            } else {
                window.location.href = "login.html";
            }
        });
    </script>
</body>
</html>
