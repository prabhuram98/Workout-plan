<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - PR Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <h2>Welcome to PR Tracker</h2>
        <input type="email" id="email" placeholder="Email" class="main-input">
        <input type="password" id="password" placeholder="Password" class="main-input">
        
        <button class="save-btn" onclick="handleLogin()">Login</button>
        <button class="back-btn" onclick="handleRegister()">Register New Account</button>
    </div>
    <script type="module" src="auth.js"></script>
</body>
</html>
