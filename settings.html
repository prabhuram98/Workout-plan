<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Settings</title>
</head>
<body>

    <header class="sub-header">
        <button class="back-btn" onclick="location.href='index.html'">←</button>
        <button class="logout-btn" onclick="performLogout()">Logout</button>
    </header>

    <div class="full-viewport">
        <button class="card big-nav-btn" onclick="location.href='account.html'">Account</button>
        <button class="card big-nav-btn" onclick="alert('Preferences coming soon')">Preference</button>
    </div>

    <script type="module">
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.x.x/firebase-auth.js";
        
        window.performLogout = async () => {
            const auth = getAuth();
            try {
                await signOut(auth);
                // Redirect to account page so they can login again if they want
                location.href = "account.html";
            } catch (e) { 
                alert("Logout failed: " + e.message); 
            }
        };
    </script>

</body>
</html>
