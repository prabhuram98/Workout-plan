<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="sub-header">
        <button class="back-btn" onclick="location.href='index.html'" style="background:none; border:none; color:white;">←</button>
        <button class="logout-btn" onclick="logout()" style="background:none; border:none; color:#ff8a80;">Logout</button>

        <button class="card" onclick="location.href='account.html'">

        </button>
        <footer>Developed by PR</footer>
    </div>
    <script type="module">
        import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.x.x/firebase-auth.js";
        window.logout = () => signOut(getAuth()).then(() => location.href = "account.html");
    </script>
</body>
</html>
